<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تريدات روبلوكس - تسجيل الدخول</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="particles-container" id="particles"></div>
    
    <div class="login-container">
        <div class="logo-section">
            <div class="logo-glow"></div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c7/Roblox_logo.svg" alt="Roblox" class="roblox-logo">
            <h1 class="site-title">تريدات روبلوكس</h1>
            <p class="site-subtitle">منصة التبادل الأولى للاعبي روبلوكس</p>
        </div>

        <form class="login-form" id="loginForm">
            <div class="input-group">
                <input type="text" id="username" required placeholder=" ">
                <label for="username">اسم المستخدم</label>
                <div class="input-line"></div>
            </div>

            <div class="input-group">
                <input type="password" id="password" required placeholder=" ">
                <label for="password">كلمة المرور</label>
                <div class="input-line"></div>
            </div>

            <button type="submit" class="login-btn">
                <span class="btn-text">تسجيل الدخول</span>
                <div class="btn-shine"></div>
            </button>
        </form>

        <div class="divider">
            <span>أو</span>
        </div>

        <a href="signup.html" class="signup-link">
            <span>إنشاء حساب جديد</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
        </a>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
